<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Prompt Chef</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>👨‍🍳 The Rizki's Prompt Chef</h1>
    <p>Masak prompt sempurna dengan resep Role, Task, Context, Format</p>

    <!-- ROLE -->
    <label>1. Role</label>
    <select id="role">
      <option>Mentor Cerdas yang Suka Bercanda</option>
      <option>Profesor Akademik yang Formal</option>
      <option>Konsultan Senior yang Tegas</option>
      <option>Teman Belajar yang Santai</option>
      <option>Kritikus Objektif</option>
    </select>

    <!-- TASK -->
    <label>2. Task</label>
    <textarea id="task" placeholder="Contoh: Jelaskan AI untuk pemula..."></textarea>

    <!-- CONTEXT -->
    <label>3. Context / Audience</label>
    <input id="context" placeholder="Contoh: Mahasiswa semester 1">

    <!-- FORMAT -->
    <label>4. Output Format</label>
    <select id="format">
      <option>Langkah demi langkah</option>
      <option>Poin-poin (bullet)</option>
      <option>Esai singkat</option>
      <option>Tabel perbandingan</option>
      <option>Dialog imajinatif</option>
    </select>

    <!-- BUTTON -->
    <button onclick="generatePrompt()">🔥 Racik Prompt</button>

    <!-- OUTPUT -->
    <h3>Hasil Prompt:</h3>
    <textarea id="output" readonly></textarea>

    <button onclick="copyPrompt()">📋 Copy</button>

  </div>
  
  <script src="presets.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
  <script src="app.js"></script>
</body>
</html>
